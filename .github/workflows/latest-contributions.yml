name: Update Recent Activity And Streak
on:
  schedule:
    - cron: "53 18 * * *"
    - cron: "7 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pytz

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_activity.py

      - name: Configure Git
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"

      - name: Commit README update (real activity found)
        if: hashFiles('.streak-fallback') == ''
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Updated last active project · $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Empty commit fallback (no activity today) 🤖
        if: hashFiles('.streak-fallback') != ''
        run: |
          git reset --hard
          git clean -fd
  build:
    name: Update this repo's README with recent activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "Update Recent Activity"
          MAX_LINES: 6
          COMMIT_NAME: ${{ github.actor }}
          COMMIT_EMAIL: ${{ github.actor }}@users.noreply.github.com
