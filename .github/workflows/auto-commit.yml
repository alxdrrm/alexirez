name: Daily Auto Commit

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-auto-commit
  cancel-in-progress: false

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pytz

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_activity.py

      - name: Configure Git
        run: |
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"

      - name: Commit README update (real activity found)
        if: hashFiles('.streak-fallback') == ''
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Updated last active project · $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Empty commit fallback (no activity today) 🤖
        if: hashFiles('.streak-fallback') != ''
        run: |
          git reset --hard
          git clean -fd
          git commit --allow-empty -m "No commits today — saving streak here 🤖"
          git push
